{% extends "base.html" %}
{% block title %}
    Ticket List
{% endblock %}

{% block content %}


    <h2 class="text-2xl font-bold my-4 text-center font-mono">
        Ticket List
    </h2>

    <!-- Add your ticket list content here -->
    <div flex class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-6 m-3">
    {% for object in object_list %}
    
    
    <div class="bg-teal-200 font-mono p-3 border-8 border-gray-50 rounded-3xl shadow-lg">
        
        <h3 class="text-lg p-3 font-semibold text-gray-700"><a href="{{object.get_absolute_url}}">{{ object.summary }}</a></h3>
    
        <p class="text-black text-base p-2 my-4 bg-teal-50">{{ object.date|date:"j F, Y"  }}</p>
        
        <small class="bg-gray-700  text-white px-4 py-2 my-5 font-bold rounded">{{ object.status }}</small>
        <small class="bg-yellow-500 text-white px-5 py-2 my-5 rounded font-bold">{{ object.priority }}</small>
        
    </div>
    {% endfor %}
    
    </div>
{% endblock %}
