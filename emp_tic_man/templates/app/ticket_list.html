{% extends "base.html" %}
{% block title %}
    Ticket List
{% endblock %}

{% block content %}
<div class="flex">
    <div class="w-2/6 lg:w-1/5 font-sans bg-slate-600 fixed left-0 top-12 h-screen hidden md:flex flex-col p-2">
        
        <p class="text-center  text-xl p-3">
            Filter
        </p>
        <hr>
        <br>
        <form action="" method="get" class="text-lg">
            
            <select name="status" id="st_id" class="bg-slate-300 border-0 rounded-full w-full my-5">
                <option value="" selected>Choose Status</option>
                <option value="OPEN">open</option>
                <option value="IN-PROCESS">in process</option>
                <option value="CLOSED">resolved</option>
                
            </select>
            
           
            <select name="priority" id="pri_id" class="bg-slate-300 border-0 rounded-full w-full my-5">
                <option value="" selected>Choose Priority</option>
                <option value="HIGH">high</option>
                <option value="MEDIUM">medium</option>
                <option value="LOW">low</option>
            </select>
            <hr>
            <button type="submit" class="p-2 px-1 bg-blue-600 hover:bg-blue-500 rounded w-full my-5 font-mono text-xl">Filter</button>
        </form>

    </div>

    <div class="w-full md:w-4/5  mx-0 md:ml-64">

        <h2 class="text-2xl font-bold my-4 text-center font-mono">
            Ticket List
        </h2>

        <!-- Add your ticket list content here -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 p-1 md:mx-4 lg:mx-10" >
        
        {% for object in object_list %}
        
        <div class="bg-teal-200 font-mono p-3 border-8 border-gray-50 rounded-3xl shadow-lg">
            
            <h3 class="text-lg p-3 font-semibold text-gray-700"><a href="{{object.get_absolute_url}}">{{ object.summary }}</a></h3>
        
            <p class="text-black text-base p-2 my-4 bg-teal-50">{{ object.created_at|date:"j F, Y" }}</p>
            
            <small class="bg-gray-700  text-white px-4 py-2 my-5 font-bold rounded">{{ object.status }}</small>
            <small class="bg-yellow-500 text-white px-5 py-2 my-5 rounded font-bold">{{ object.priority }}</small>
            
        </div>
        
        {% endfor %}
        
        </div>
    </div>

</div>    
{% endblock %}
